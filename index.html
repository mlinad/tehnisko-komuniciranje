<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moj Super App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; }
        header { background: #333; color: white; width: 100%; padding: 1rem; text-align: center; font-weight: bold; }
        
        /* Kalkulator stil */
        .calc-container { background: #222; padding: 15px; border-radius: 15px; margin: 20px 0; width: 90%; max-width: 300px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #display { width: 100%; height: 50px; font-size: 1.5rem; text-align: right; margin-bottom: 10px; border: none; padding: 10px; box-sizing: border-box; background: #eee; border-radius: 5px; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 15px; font-size: 1.2rem; border: none; border-radius: 5px; cursor: pointer; background: #444; color: white; }
        button:active { background: #666; }
        .operator { background: #f39c12; }
        .equals { background: #27ae60; grid-column: span 2; }
        .clear { background: #c0392b; grid-column: span 2; }

        /* Beležka stil */
        textarea { width: 90%; max-width: 300px; height: 150px; padding: 10px; border-radius: 10px; border: 1px solid #ccc; font-size: 1rem; }
        .status { font-size: 0.7rem; color: #777; margin-top: 5px; }
    </style>
</head>
<body>

<header>MOJ OSEBNI APP</header>

<div class="calc-container">
    <input type="text" id="display" disabled>
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="addToDisplay('/')">/</button>
        <button class="operator" onclick="addToDisplay('*')">*</button>
        
        <button onclick="addToDisplay('7')">7</button>
        <button onclick="addToDisplay('8')">8</button>
        <button onclick="addToDisplay('9')">9</button>
        <button class="operator" onclick="addToDisplay('-')">-</button>
        
        <button onclick="addToDisplay('4')">4</button>
        <button onclick="addToDisplay('5')">5</button>
        <button onclick="addToDisplay('6')">6</button>
        <button class="operator" onclick="addToDisplay('+')">+</button>
        
        <button onclick="addToDisplay('1')">1</button>
        <button onclick="addToDisplay('2')">2</button>
        <button onclick="addToDisplay('3')">3</button>
        <button onclick="calculate()">=</button>
        
        <button onclick="addToDisplay('0')">0</button>
        <button onclick="addToDisplay('.')">.</button>
        <button class="equals" onclick="calculate()" style="grid-column: span 2;">=</button>
    </div>
</div>

<textarea id="note" placeholder="Tukaj so tvoji zapiski..."></textarea>
<div id="status" class="status">Shranjeno lokalno</div>

<script>
    // LOGIKA ZA KALKULATOR
    const display = document.getElementById('display');

    function addToDisplay(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = '';
    }

    function calculate() {
        try {
            // eval() izračuna string (npr. "2+2" postane 4)
            display.value = eval(display.value);
        } catch (e) {
            display.value = 'Napaka';
            setTimeout(clearDisplay, 1000);
        }
    }

    // LOGIKA ZA BELEŽKO
    const noteArea = document.getElementById('note');
    noteArea.value = localStorage.getItem('moja_belezka') || "";

    noteArea.addEventListener('input', () => {
        localStorage.setItem('moja_belezka', noteArea.value);
    });

    // REGISTRACIJA SERVICE WORKERJA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
